name: Build and Release

on:
  push:
    tags:
      - 'v*' # 当你向 GitHub 推送类似于 v1.0.0 的 tag 时自动触发

permissions:
  contents: write # 赋予 Workflow 在你的仓库创建 Release 版本的权限

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false # 保证如果某个系统编译失败，不影响其他系统的继续编译

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux Desktop Dependencies
        if: runner.os == 'Linux'
        # 在无头 Linux 服务器上编译 Qt 程序，需要补充一些系统底层的图形库依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 patchelf build-essential

      - name: Install Python Dependencies
        run: |
          uv sync
          uv add nuitka ordered-set

      - name: Build with Nuitka (macOS)
        if: runner.os == 'macOS'
        run: |
          uv run python -m nuitka --assume-yes-for-downloads --standalone --lto=yes --python-flag=no_asserts,no_docstrings --macos-create-app-bundle --macos-app-name="QuickSFTP" --plugin-enable=pyside6 --include-data-dir=quicksftp/assets=quicksftp/assets main.py
          mv main.app QuickSFTP.app
          tar -czf QuickSFTP-macOS-portable.tar.gz QuickSFTP.app
          mkdir dmg_dir
          mv QuickSFTP.app dmg_dir/
          ln -s /Applications dmg_dir/Applications
          hdiutil create -volname "QuickSFTP" -srcfolder dmg_dir -ov -format UDZO QuickSFTP-macOS.dmg

      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        run: |
          uv run python -m nuitka --assume-yes-for-downloads --standalone --lto=yes --python-flag=no_asserts,no_docstrings --windows-console-mode=disable --plugin-enable=pyside6 --include-data-dir=quicksftp/assets=quicksftp/assets --output-dir=build_output main.py
          Rename-Item -Path "build_output\main.dist\main.exe" -NewName "QuickSFTP.exe"
          Rename-Item -Path "build_output\main.dist" -NewName "QuickSFTP"
          Compress-Archive -Path "build_output\QuickSFTP" -DestinationPath QuickSFTP-Windows-portable.zip
          $issContent = @"
          [Setup]
          AppName=QuickSFTP
          AppVersion=1.1.1
          DefaultDirName={autopf}\QuickSFTP
          DefaultGroupName=QuickSFTP
          OutputDir=.
          OutputBaseFilename=QuickSFTP-Windows-Setup
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesInstallIn64BitMode=x64
          PrivilegesRequired=lowest

          [Files]
          Source: "build_output\QuickSFTP\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\QuickSFTP"; Filename: "{app}\QuickSFTP.exe"
          Name: "{autodesktop}\QuickSFTP"; Filename: "{app}\QuickSFTP.exe"; Tasks: desktopicon

          [Tasks]
          Name: "desktopicon"; Description: "Create a desktop icon"; GroupDescription: "Additional icons:"
          "@
          Set-Content -Path "installer.iss" -Value $issContent
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Build with Nuitka (Linux)
        if: runner.os == 'Linux'
        run: |
          uv run python -m nuitka --assume-yes-for-downloads --standalone --lto=yes --python-flag=no_asserts,no_docstrings --plugin-enable=pyside6 --include-data-dir=quicksftp/assets=quicksftp/assets --output-dir=build_output main.py
          mv build_output/main.dist build_output/QuickSFTP
          tar -czf QuickSFTP-Linux.tar.gz -C build_output QuickSFTP

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            QuickSFTP-macOS.dmg
            QuickSFTP-macOS-portable.tar.gz
            QuickSFTP-Windows-Setup.exe
            QuickSFTP-Windows-portable.zip
            QuickSFTP-Linux.tar.gz
